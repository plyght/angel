<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0a0a0a; --surface: #141414; --border: #222; --text: #e5e5e5; --muted: #888; --accent: #fff; --tool-bg: #1a1a1a; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  #header .status { font-size: 12px; color: var(--muted); }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #1a1a2e; color: #e5e5e5; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.tool { align-self: flex-start; background: var(--tool-bg); border: 1px solid var(--border); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: var(--muted); padding: 8px 12px; border-radius: 8px; }
  .msg.tool .tool-name { color: var(--accent); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .msg.thinking { align-self: flex-start; color: var(--muted); font-style: italic; padding: 8px 16px; }
  .msg code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  .msg pre { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .msg pre code { background: none; padding: 0; }
  #input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  #input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; resize: none; min-height: 44px; max-height: 150px; }
  #input:focus { border-color: #333; }
  #input::placeholder { color: var(--muted); }
  #send { background: var(--accent); color: var(--bg); border: none; padding: 0 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 44px; }
  #send:hover { opacity: 0.9; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }
  .streaming-cursor { display: inline-block; width: 2px; height: 14px; background: var(--accent); animation: blink 1s infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
</style>
</head>
<body>
<div id="header">
  <h1>angel</h1>
  <span class="status" id="status">connecting...</span>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" placeholder="Message Angel..." rows="1"></textarea>
  <button id="send">Send</button>
</div>
<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');

const chatId = 'web_' + (localStorage.getItem('angel_chat_id') || (() => { const id = Math.random().toString(36).slice(2, 10); localStorage.setItem('angel_chat_id', id); return id; })());

let ws = null;
let currentAssistantMsg = null;
let isProcessing = false;

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws?chatId=${chatId}`);

  ws.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.style.color = '#4a4';
  };

  ws.onclose = () => {
    statusEl.textContent = 'disconnected';
    statusEl.style.color = '#a44';
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    switch (data.type) {
      case 'thinking':
        addMessage('thinking', 'Thinking...');
        break;

      case 'text_delta':
        if (!currentAssistantMsg) {
          removeThinking();
          currentAssistantMsg = addMessage('assistant', '');
        }
        const cursor = currentAssistantMsg.querySelector('.streaming-cursor');
        if (cursor) cursor.remove();
        currentAssistantMsg.textContent += data.delta;
        currentAssistantMsg.innerHTML += '<span class="streaming-cursor"></span>';
        messagesEl.scrollTop = messagesEl.scrollHeight;
        break;

      case 'tool_start':
        removeThinking();
        const toolMsg = addMessage('tool', '');
        toolMsg.innerHTML = `<div class="tool-name">${escapeHtml(data.name)}</div>Running...`;
        break;

      case 'tool_result':
        const toolMsgs = messagesEl.querySelectorAll('.msg.tool');
        const lastTool = toolMsgs[toolMsgs.length - 1];
        if (lastTool) {
          lastTool.innerHTML = `<div class="tool-name">${escapeHtml(data.name)}</div>${escapeHtml((data.result || '').slice(0, 300))}`;
        }
        break;

      case 'message_complete':
        if (currentAssistantMsg) {
          const c = currentAssistantMsg.querySelector('.streaming-cursor');
          if (c) c.remove();
          currentAssistantMsg = null;
        } else {
          removeThinking();
          addMessage('assistant', data.text || '');
        }
        isProcessing = false;
        sendBtn.disabled = false;
        inputEl.focus();
        break;

      case 'error':
        removeThinking();
        addMessage('assistant', `Error: ${data.message}`);
        isProcessing = false;
        sendBtn.disabled = false;
        break;
    }
  };
}

function addMessage(type, text) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function removeThinking() {
  const thinking = messagesEl.querySelector('.msg.thinking');
  if (thinking) thinking.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function send() {
  const text = inputEl.value.trim();
  if (!text || isProcessing) return;

  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isProcessing = true;
  sendBtn.disabled = true;
  currentAssistantMsg = null;

  ws.send(JSON.stringify({ type: 'message', text }));
}

sendBtn.onclick = send;
inputEl.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
inputEl.oninput = () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
};

connect();
</script>
</body>
</html>
